<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1a"/><stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="80" y="80" width="640" height="440" rx="10" fill="rgba(10,20,40,0.95)" stroke="rgba(37,99,235,0.3)" stroke-width="1.5"/>
  <rect x="80" y="80" width="640" height="36" rx="10" fill="rgba(20,35,60,0.9)"/>
  <rect x="80" y="100" width="640" height="16" fill="rgba(20,35,60,0.9)"/>
  <circle cx="104" cy="98" r="6" fill="rgba(255,80,80,0.7)"/>
  <circle cx="124" cy="98" r="6" fill="rgba(255,180,0,0.7)"/>
  <circle cx="144" cy="98" r="6" fill="rgba(0,200,80,0.7)"/>
  <text x="400" y="103" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="11" text-anchor="middle">firmware.build — gmic_sdk v2.4.1</text>
  <line x1="126" y1="125" x2="126" y2="510" stroke="rgba(37,99,235,0.2)" stroke-width="1"/>
  <g fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="12">
    <text x="100" y="148">01</text><text x="100" y="168">02</text>
    <text x="100" y="208">04</text><text x="100" y="228">05</text>
    <text x="100" y="248">06</text><text x="100" y="268">07</text>
    <text x="100" y="288">08</text><text x="100" y="308">09</text>
    <text x="100" y="328">10</text><text x="100" y="348">11</text>
    <text x="100" y="388">13</text><text x="100" y="408">14</text>
    <text x="100" y="428">15</text><text x="100" y="448">16</text>
  </g>
  <g font-family="monospace" font-size="12">
    <text x="140" y="148" fill="#60a5fa">#include </text>
    <text x="232" y="148" fill="#a5d6a7">"gmic_voice_sdk.h"</text>
    <text x="140" y="168" fill="#60a5fa">#include </text>
    <text x="232" y="168" fill="#a5d6a7">"ble_transport.h"</text>
    <text x="140" y="208" fill="rgba(255,255,255,0.3)">// Initialize voice pipeline</text>
    <text x="140" y="228" fill="#c792ea">void </text>
    <text x="178" y="228" fill="#82aaff">voice_init</text>
    <text x="250" y="228" fill="rgba(255,255,255,0.8)">(VoiceConfig *cfg) {</text>
    <text x="140" y="248" fill="#c792ea">  if </text>
    <text x="185" y="248" fill="rgba(255,255,255,0.8)">(cfg->sample_rate == </text>
    <text x="358" y="248" fill="#f78c6c">16000</text>
    <text x="394" y="248" fill="rgba(255,255,255,0.8)">) {</text>
    <rect x="130" y="256" width="580" height="18" fill="rgba(37,99,235,0.15)" rx="2"/>
    <text x="160" y="270" fill="rgba(255,255,255,0.8)">    dsp_</text>
    <text x="204" y="270" fill="#82aaff">enable_noise_cancel</text>
    <text x="360" y="270" fill="rgba(255,255,255,0.8)">(</text>
    <text x="368" y="270" fill="#f78c6c">true</text>
    <text x="397" y="270" fill="rgba(255,255,255,0.8)">);</text>
    <rect x="422" y="258" width="2" height="14" fill="#2563eb" opacity="0.9"/>
    <text x="160" y="288" fill="rgba(255,255,255,0.8)">    ble_stream_init(cfg->endpoint);</text>
    <text x="140" y="308" fill="rgba(255,255,255,0.5)">  }</text>
    <text x="140" y="328" fill="#c792ea">  return </text>
    <text x="198" y="328" fill="#82aaff">GMIC_OK</text>
    <text x="258" y="328" fill="rgba(255,255,255,0.8)">;</text>
    <text x="140" y="348" fill="rgba(255,255,255,0.5)">}</text>
    <text x="140" y="388" fill="rgba(255,255,255,0.3)">// AI inference callback</text>
    <text x="140" y="408" fill="#c792ea">void </text>
    <text x="178" y="408" fill="#82aaff">on_voice_event</text>
    <text x="280" y="408" fill="rgba(255,255,255,0.8)">(AudioFrame *f) {</text>
    <text x="160" y="428" fill="#82aaff">  ai_model_infer</text>
    <text x="284" y="428" fill="rgba(255,255,255,0.8)">(f->data, f->len);</text>
    <text x="140" y="448" fill="rgba(255,255,255,0.5)">}</text>
  </g>
  <rect x="80" y="462" width="640" height="58" fill="rgba(5,15,30,0.95)"/>
  <g font-family="monospace" font-size="12">
    <text x="140" y="482" fill="#4ade80">✓ Build successful — </text>
    <text x="330" y="482" fill="#60a5fa">firmware_v2.4.1.bin</text>
    <text x="140" y="500" fill="rgba(255,255,255,0.3)">$ flash --target gmic-opsmic --port /dev/ttyUSB0</text>
    <text x="140" y="518" fill="#fbbf24">⚡ Flashing... </text>
    <text x="242" y="518" fill="rgba(255,255,255,0.5)">98% ████████████████████░  1.2s</text>
  </g>
</svg>
